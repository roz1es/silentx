name: brenkschat_desktop
description: Native Flutter desktop client for BrenksChat.
publish_to: "none"
version: 0.1.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  audioplayers: ^6.5.1
  camera_macos: ^0.0.9
  desktop_drop: ^0.7.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  http: ^1.2.2
  mime: ^2.0.0
  pasteboard: ^0.5.0
  path_provider: ^2.1.5
  record: ^6.1.2
  shared_preferences: ^2.3.2
  socket_io_client: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
