name: Build Windows installer

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-installer.yml"
      - "desktop/**"
  workflow_dispatch:
    inputs:
      api_url:
        description: "BrenksChat server URL"
        required: true
        default: "https://silentx.ru"
      update_url:
        description: "Auto-update manifest URL"
        required: true
        default: "https://silentx.ru/desktop/windows/latest.json"
      download_base_url:
        description: "Public folder with installer files"
        required: true
        default: "https://silentx.ru/desktop/windows"

jobs:
  build:
    name: Build Flutter Windows installer
    runs-on: windows-latest
    env:
      API_URL: ${{ github.event.inputs.api_url || 'https://silentx.ru' }}
      UPDATE_URL: ${{ github.event.inputs.update_url || 'https://silentx.ru/desktop/windows/latest.json' }}
      DOWNLOAD_BASE_URL: ${{ github.event.inputs.download_base_url || 'https://silentx.ru/desktop/windows' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          .\desktop\installer\windows\build-installer.ps1 `
            -ApiUrl "$env:API_URL" `
            -UpdateUrl "$env:UPDATE_URL" `
            -DownloadBaseUrl "$env:DOWNLOAD_BASE_URL"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: brenkschat-windows-installer
          path: |
            desktop/release/windows/BrenksChatSetup-*.exe
            desktop/release/windows/latest.json
          if-no-files-found: error
